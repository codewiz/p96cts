name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build p96cts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build binary inside Amiga GCC container
        run: make docker-build

      - name: Upload p96cts binary
        uses: actions/upload-artifact@v4
        with:
          name: p96cts
          path: p96cts
